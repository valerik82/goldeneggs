name: Android Bundle Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Give gradlew permission
        run: chmod +x gradlew
        working-directory: android

           - name: Create missing Capacitor Cordova files
        run: |
          mkdir -p capacitor-cordova-android-plugins
          touch capacitor-cordova-android-plugins/cordova.variables.gradle
        working-directory: android

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab